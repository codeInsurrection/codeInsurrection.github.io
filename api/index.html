
<html>
  <head>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        console.info ('%cLoaded', 'color:limegreen');
        document.querySelector('#apiSettings').addEventListener('click', async (e) => {
          console.info ('%cClicked', 'color:cadetblue');
          const r = await chrome.runtime.sendMessage ('mbcjhgcchbahnocodopfajipjconbkom', {action: 'externalOpenSettings'});
          console.info ('API:', r);
        });

        document.querySelector('#apiSearch').addEventListener('click', async (e) => {
          console.info ('%cClicked', 'color:cadetblue');
          const r = await chrome.runtime.sendMessage ('mbcjhgcchbahnocodopfajipjconbkom', {action: 'externalAddSearchTerm'});
          console.info ('API:', r);
        });
      });
    </script>
  </head>
  <body>
    <h1>This is an integration test</h1>
    <div>
      <p>Here is some text that contains some words to search for. We will programatically add search terms from the button below. The searched terms will be highlighted.</p>
    </div>
    <div>
      <button id='apiSettings'>Open Settings</button>
      <button id='apiSearch'>Search</button>
    </div>
  </body>
</html>
